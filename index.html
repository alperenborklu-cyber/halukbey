    <!-- Single Inline Script to prevent CORS issues on file:// protocol and script race conditions -->
    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        // Suppress benign Framer Motion warnings
        const originalError = console.error;
        console.error = (...args) => {
            if (args[0] && typeof args[0] === 'string' && (args[0].includes('Framer Motion') || args[0].includes('Warning: Each child in a list'))) {
                return;
            }
            originalError(...args);
        };

        // FadingVideo Component
        function FadingVideo({ src, className, style }) {
            const videoRef = useRef(null);
            const rafIdRef = useRef(null);
            const fadingOutRef = useRef(false);
            const FADE_MS = 500;
            const FADE_OUT_LEAD = 0.55;

            const fadeTo = (targetOpacity, durationMs) => {
                if (rafIdRef.current) {
                    cancelAnimationFrame(rafIdRef.current);
                }

                const video = videoRef.current;
                if (!video) return;

                const startOpacity = parseFloat(video.style.opacity) || 0;
                const opacityDiff = targetOpacity - startOpacity;
                
                const startTime = performance.now();

                const animate = (now) => {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / durationMs, 1);
                    video.style.opacity = startOpacity + opacityDiff * progress;

                    if (progress < 1) {
                        rafIdRef.current = requestAnimationFrame(animate);
                    }
                };

                rafIdRef.current = requestAnimationFrame(animate);
            };

            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;

                video.style.opacity = "0";

                const handleLoadedData = () => {
                    video.style.opacity = "0";
                    video.play().catch(err => console.log("Playback prevented:", err));
                    fadeTo(1, FADE_MS);
                };

                const handleTimeUpdate = () => {
                    const duration = video.duration;
                    const currentTime = video.currentTime;
                    
                    if (duration && duration > 0) {
                        const remaining = duration - currentTime;
                        if (!fadingOutRef.current && remaining <= FADE_OUT_LEAD && remaining > 0) {
                            fadingOutRef.current = true;
                            fadeTo(0, FADE_MS);
                        }
                    }
                };

                const handleEnded = () => {
                    video.style.opacity = "0";
                    setTimeout(() => {
                        if (videoRef.current) {
                            videoRef.current.currentTime = 0;
                            videoRef.current.play().catch(err => console.log("Playback prevented on loop:", err));
                            fadingOutRef.current = false;
                            fadeTo(1, FADE_MS);
                        }
                    }, 100);
                };

                video.addEventListener('loadeddata', handleLoadedData);
                video.addEventListener('timeupdate', handleTimeUpdate);
                video.addEventListener('ended', handleEnded);

                if (video.readyState >= 3) {
                    handleLoadedData();
                }

                return () => {
                    if (rafIdRef.current) {
                        cancelAnimationFrame(rafIdRef.current);
                    }
                    video.removeEventListener('loadeddata', handleLoadedData);
                    video.removeEventListener('timeupdate', handleTimeUpdate);
                    video.removeEventListener('ended', handleEnded);
                };
            }, [src]);

            return (
                <video
                    ref={videoRef}
                    src={src}
                    className={className}
                    style={style}
                    autoPlay
                    muted
                    playsInline
                    preload="auto"
                />
            );
        }

        // BlurText Component
        function BlurText({ text, className }) {
            const containerRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1 }
                );

                if (containerRef.current) {
                    observer.observe(containerRef.current);
                }

                return () => {
                    observer.disconnect();
                };
            }, []);

            const words = text.split(" ");

            return (
                <p
                    ref={containerRef}
                    className={className}
                    style={{
                        display: "flex",
                        flexWrap: "wrap",
                        justifyContent: "center",
                        rowGap: "0.1em"
                    }}
                >
                    {words.map((word, i) => {
                        const delay = i * 0.1;
                        return (
                            <Motion.motion.span
                                key={i}
                                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                                animate={
                                    isVisible
                                        ? {
                                              filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                                              opacity: [0, 0.5, 1],
                                              y: [50, -5, 0]
                                          }
                                        : {}
                                }
                                transition={{
                                    duration: 0.7,
                                    times: [0, 0.5, 1],
                                    ease: "easeOut",
                                    delay: delay
                                }}
                                style={{
                                    display: "inline-block",
                                    marginRight: "0.28em"
                                }}
                            >
                                {word}
                            </Motion.motion.span>
                        );
                    })}
                </p>
            );
        }
